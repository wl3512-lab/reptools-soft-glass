        * { margin: 0; padding: 0; box-sizing: border-box; }

            background: var(--ink);

        nav {

        nav a {

            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: color 0.2s ease;
        }

        nav a:hover, nav a.active {
            color: var(--accent-primary);
        }
        
        .tutorial-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 2rem 4rem;

        .tutorial-header {

        }

        .tutorial-header h1 {
            font-family: var(--font-display);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: 0.005em;
            font-weight: 400;
            font-size: clamp(2.75rem, 8vw, 5rem);
            margin-bottom: 0.75rem;
        }

        .tutorial-header h1 span {
            color: var(--accent-primary);
        }

        .tutorial-header p {
            color: var(--text-secondary);

        }
        
        .tutorial-content {

            flex-direction: column;
            gap: 2rem;
        }
        
        .tutorial-step {
            background: var(--ink-raised);
            border: 2px solid var(--ink-line);
            border-radius: 4px;
            padding: 2rem;
            box-shadow: 6px 6px 0 var(--ink);
        }

        .step-number {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .step-title {
            font-family: var(--font-display);
            text-transform: uppercase;
            line-height: 0.95;
            letter-spacing: 0.005em;
            font-weight: 400;
            font-size: 1.7rem;
            margin-bottom: 0.75rem;
        }
        
        .step-body {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.7;
        }
        
        .step-body a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .step-body a:hover {
            text-decoration: underline;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            margin-top: 1rem;
            border: 2px solid var(--ink-line);
            border-radius: 4px;
            overflow: hidden;
            background: #000;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .tutorial-placeholder {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        
        .tutorial-placeholder-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        footer {
            padding: 3rem;
            border-top: 2px solid var(--ink-line);
            text-align: center;
            color: var(--text-muted);
            margin-top: 4rem;
        }
        
        @media (max-width: 768px) {
            header { padding: 1rem; }
            nav { gap: 1.1rem; }
            nav a { font-size: 0.85rem; }
            .tutorial-container { padding: 80px 1rem 2rem; }

            .step-title { font-size: 1.1rem; }
