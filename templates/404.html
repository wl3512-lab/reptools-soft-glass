<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--ink); color: var(--bone); min-height: 100vh;

            display: flex; align-items: center; justify-content: center; text-align: center;
            padding: 24px;
        }
        .wrap { max-width: 560px; display: flex; flex-direction: column; align-items: center; }
        .lost-tag { margin-bottom: 18px; }

            font-family: var(--font-display); text-transform: uppercase;
            font-size: clamp(5rem, 22vw, 11rem); letter-spacing: .01em; line-height: .82;
            color: var(--hazard);
        }
        h1 {
            font-family: var(--font-display); text-transform: uppercase;
            line-height: .9; font-size: clamp(1.4rem, 5vw, 2.2rem);
            margin: 14px 0 10px; color: var(--bone);
        }
        p { color: var(--bone-dim); line-height: 1.6; margin-bottom: 28px; max-width: 44ch; }
        .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .links a {
            display: inline-flex; align-items: center;
            font-family: var(--font-body); font-weight: 800; text-transform: uppercase;
            letter-spacing: .04em; font-size: 14px; padding: 11px 18px;
            text-decoration: none; color: var(--bone);
            background: var(--ink-raised); border: 2px solid var(--ink-line);
            box-shadow: 4px 4px 0 rgba(0,0,0,.55);
            transition: border-color .15s, color .15s;
        }
        .links a:hover { border-color: var(--hazard); color: var(--hazard); }
        .brand { margin-bottom: 26px; }
    </style>
</head>
